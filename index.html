<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/logos/moye-logo-icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <meta name="author" content="Moye Law" />

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Montserrat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <!-- Local font fallbacks -->
    <link href="/fonts/inter.css" rel="stylesheet">
    <link href="/fonts/montserrat.css" rel="stylesheet">

    <meta property="og:title" content="Moye Law - Family Values, Future-Forward Legal Solutions" />
    <meta property="og:description" content="Sophisticated legal services with a personal touch, combining traditional values with innovative solutions." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/images/moye-law-social-card.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@moyelaw" />
    <meta name="twitter:image" content="/images/moye-law-social-card.png" />

    <meta name="theme-color" content="#0A2342">
    <link rel="manifest" href="/manifest.json">

    <!-- Add structured data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "LawFirm",
        "name": "Moye Law",
        "description": "Family Values, Future-Forward Legal Solutions"
        // ... more structured data
      }
    </script>
    
    <!-- Add canonical URL -->
    <link rel="canonical" href="https://yourwebsite.com" />

    <!-- Security headers are now managed via Netlify _headers file -->
    
    <!-- Add more meta tags -->
    <link rel="alternate" hreflang="es" href="https://yoursite.com/es/" />
    <meta name="geo.region" content="US" />
    <meta name="robots" content="index, follow" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />
    
    <!-- Single Page App routing fix -->
    <script type="text/javascript">
      // This script handles redirects for SPA routing
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>

    <!-- Preload Core Fonts -->
    <link rel="preload" href="https://fonts.gstatic.com/s/inter/v13/UcC73FwrK3iLTeHuS_fvQtMwCp50KnMa1ZL7.woff2" as="font" type="font/woff2" crossorigin="anonymous">
    <link rel="preload" href="https://fonts.gstatic.com/s/montserrat/v26/JTUSjIg1_i6t8kCHKm459Wlhyw.woff2" as="font" type="font/woff2" crossorigin="anonymous">

    <!-- Preconnect to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Move Google fonts after critical CSS to avoid render blocking -->
    <style>
      /* Critical CSS inlined for above-the-fold content */
      body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        background-color: #FFFFFF;
        color: #0A2342;
      }
      /* Add simple font fallbacks while Google fonts load */
      .font-display {
        font-family: 'Cormorant Garamond', Georgia, serif;
      }
      /* Hide body until critical assets are loaded */
      body:not(.loaded) {
        visibility: hidden;
      }
      
      /* Initial shell styles */
      #initial-header {
        background-color: #0A2342;
        color: white;
        padding: 1rem 1.5rem;
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #initial-header h1 {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-weight: 700;
        font-size: 1.875rem;
        line-height: 2.25rem;
        letter-spacing: -0.025em;
        margin: 0;
      }
      /* This will be hidden once React renders */
      #initial-header.hidden {
        display: none;
      }
    </style>
    
    <!-- Google Font with font-display:swap to avoid render blocking -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" media="print" onload="this.media='all'" />
    
    <!-- Fallback for browsers that don't support JS loading of fonts -->
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" />
    </noscript>
    
    <!-- GTM with proper async loading -->
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-LCB4ZJ4848"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-LCB4ZJ4848', { 'send_page_view': false }); // Defer pageview until after page load
    </script>
    
    <!-- Mark body as loaded when DOM is ready -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        document.body.classList.add('loaded');
      });
    </script>
  </head>

  <body>
    <!-- Initial shell that renders immediately -->
    <header id="initial-header">
      <h1>MOYE LAW</h1>
    </header>
    
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <script>
      // Hide the initial shell once React has rendered
      document.addEventListener('DOMContentLoaded', function() {
        document.body.classList.add('loaded');
        // Wait a short time to ensure React has rendered its version
        setTimeout(function() {
          const initialHeader = document.getElementById('initial-header');
          if (initialHeader) {
            initialHeader.classList.add('hidden');
          }
        }, 100);
      });
    </script>
    
    <!-- Keak Tracking Pixel -->
    <script 
      id="keak-script"
      src="https://zzontar2hsjaawcn.public.blob.vercel-storage.com/scripts/domain-465-httpsMoye.law.js"
      data-domain="465"
      async
    ></script>
  </body>
</html>
